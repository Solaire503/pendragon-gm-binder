<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pendragon — The Hall Falls Silent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: #0d0b08;
    background-image:
      radial-gradient(ellipse at 50% 0%, rgba(139,90,43,.15) 0%, transparent 65%),
      radial-gradient(ellipse at 50% 100%, rgba(60,30,10,.4) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,.008) 2px, rgba(255,255,255,.008) 4px);
    font-family: 'EB Garamond', Georgia, serif;
    color: #c8b99a;
    padding: 20px;
  }

  .card {
    background: linear-gradient(160deg, #1a1410 0%, #110e0b 100%);
    border: 1px solid #3a2e22;
    border-radius: 4px;
    padding: 3rem 3.5rem;
    width: 100%;
    max-width: 460px;
    text-align: center;
    box-shadow:
      0 8px 48px rgba(0,0,0,.8),
      inset 0 1px 0 rgba(255,220,150,.05),
      inset 0 -1px 0 rgba(0,0,0,.3);
    position: relative;
  }

  /* Decorative corner flourishes */
  .card::before, .card::after {
    content: '✦';
    position: absolute;
    color: #3a2e22;
    font-size: 0.6rem;
  }
  .card::before { top: 10px; left: 14px; }
  .card::after  { bottom: 10px; right: 14px; }

  .candle {
    font-size: 3rem;
    line-height: 1;
    margin-bottom: 1rem;
    filter: drop-shadow(0 0 18px rgba(220,160,60,.35));
    animation: flicker 3s ease-in-out infinite;
  }

  @keyframes flicker {
    0%, 100% { filter: drop-shadow(0 0 18px rgba(220,160,60,.35)); opacity: 1; }
    25%       { filter: drop-shadow(0 0 10px rgba(220,160,60,.2));  opacity: 0.92; }
    50%       { filter: drop-shadow(0 0 22px rgba(220,160,60,.45)); opacity: 1; }
    75%       { filter: drop-shadow(0 0 8px  rgba(220,160,60,.15)); opacity: 0.88; }
  }

  .title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.15rem;
    font-weight: 400;
    color: #c8a96e;
    letter-spacing: .04em;
    margin-bottom: .5rem;
    line-height: 1.3;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 1.2rem 0;
    color: #3a2e22;
    font-size: .6rem;
    letter-spacing: .3em;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, #3a2e22, transparent);
  }

  .flavor {
    font-style: italic;
    font-size: 1.05rem;
    color: #8a7355;
    line-height: 1.7;
    margin-bottom: 1.8rem;
  }

  .flavor strong {
    font-style: normal;
    color: #a8905a;
    font-weight: 500;
  }

  .address-block {
    background: rgba(0,0,0,.3);
    border: 1px solid #2a2018;
    border-radius: 3px;
    padding: .6rem 1rem;
    margin-bottom: 1.8rem;
    font-family: 'Cinzel', serif;
    font-size: .65rem;
    letter-spacing: .1em;
    color: #6b5a42;
  }
  .address-block span {
    color: #8a7355;
    font-size: .78rem;
  }

  .btn-retry {
    width: 100%;
    padding: .8rem;
    background: linear-gradient(180deg, #6b4f2a 0%, #4a3318 100%);
    border: 1px solid #8a6535;
    border-radius: 3px;
    color: #e8d5a8;
    font-family: 'Cinzel', serif;
    font-size: .82rem;
    letter-spacing: .12em;
    cursor: pointer;
    transition: all .2s;
    text-transform: uppercase;
  }
  .btn-retry:hover {
    background: linear-gradient(180deg, #7d5c32 0%, #5a3e20 100%);
    color: #f5e6c0;
    box-shadow: 0 2px 12px rgba(139,90,43,.3);
  }
  .btn-retry:active {
    transform: translateY(1px);
  }

  .footer {
    margin-top: 1.4rem;
    font-family: 'Cinzel', serif;
    font-size: .6rem;
    letter-spacing: .15em;
    color: #3a2e22;
    text-transform: uppercase;
  }

  /* Retry countdown */
  #countdown {
    display: inline-block;
    margin-top: .8rem;
    font-size: .8rem;
    color: #6b5a42;
    font-style: italic;
    min-height: 1.2em;
  }
</style>
</head>
<body>
<div class="card">
  <div class="candle">🕯</div>

  <div class="title">The Hall Falls Silent</div>

  <div class="divider">⚜</div>

  <p class="flavor">
    The binder server cannot be reached.<br>
    <strong>Mayhaps the server PC sleeps,</strong> or the
    network path is broken. The binder waits in darkness
    for the torches to be relit.
  </p>

  <div class="address-block">
    Seeking the hall at<br>
    <span id="server-address">—</span>
  </div>

  <button class="btn-retry" onclick="retry()">⚔ Attempt to Reconnect</button>
  <div id="countdown"></div>

  <div class="footer">Pendragon GM's Binder &nbsp;·&nbsp; v2.0</div>
</div>

<script>
  // Show the address the player was trying to reach
  document.getElementById('server-address').textContent = window.location.host || 'unknown';

  // Auto-retry countdown
  let seconds = 30;
  const cd = document.getElementById('countdown');

  function updateCountdown() {
    if (seconds <= 0) {
      retry();
      return;
    }
    cd.textContent = 'Retrying in ' + seconds + ' second' + (seconds !== 1 ? 's' : '') + '…';
    seconds--;
    setTimeout(updateCountdown, 1000);
  }

  function retry() {
    cd.textContent = 'Seeking the hall…';
    window.location.reload();
  }

  updateCountdown();
</script>
</body>
</html>
