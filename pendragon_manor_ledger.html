<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pendragon Manor Ledger</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#1c1a14;--s1:#252318;--s2:#2e2b1e;--s3:#363224;--brd:#4a4535;--bl:#3d3928;--p:#e8dfc8;--pd:#c8bfa8;--ink:#e8dfc8;--il:#c8bfa8;--if:#9a9080;--ix:#7a7060;--amb:#c8922a;--ap:#2e2418;--red:#c85050;--rp:#281818;--grn:#5a9c6a;--gp:#182418;--blu:#5882a8;--bp:#181c28;--pur:#8868b8;--pp:#1e1828;--shd:rgba(0,0,0,.4);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Crimson Pro',Georgia,serif;background:var(--bg);color:var(--p);min-height:100vh;line-height:1.5;}
.hdr{background:#0f0e09;color:var(--p);padding:.7rem 1.4rem;display:flex;align-items:center;gap:.9rem;flex-wrap:wrap;border-bottom:2px solid var(--amb);position:sticky;top:0;z-index:100;}
.htitle{font-family:'IM Fell English',serif;font-size:1.4rem;letter-spacing:.03em;flex:1;}
.htitle em{color:var(--ap);font-style:italic;}
.yrctl{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.08);border:1px solid rgba(196,184,154,.3);border-radius:4px;padding:4px 9px;}
.yrctl label{font-size:.7rem;color:var(--ix);text-transform:uppercase;letter-spacing:.06em;}
.yrinp{background:transparent;border:none;color:var(--p);font-family:'Crimson Pro',serif;font-size:1rem;font-weight:600;width:64px;text-align:center;outline:none;}
.yrarr{display:flex;flex-direction:column;gap:1px;}
.yra{background:none;border:none;color:var(--ix);cursor:pointer;font-size:.58rem;line-height:1;padding:1px 3px;transition:color .15s;}
.yra:hover{color:var(--p);}
.hbtns{display:flex;gap:5px;align-items:center;}
.hb{padding:5px 11px;border-radius:4px;font-family:'Crimson Pro',serif;font-size:.85rem;cursor:pointer;border:1px solid;transition:all .15s;}
.hbg{background:transparent;border-color:rgba(196,184,154,.4);color:#e8e0cc;}
.hbg:hover{background:rgba(255,255,255,.1);}
.hbp{background:var(--amb);border-color:var(--amb);color:var(--p);font-weight:600;}
.hbp:hover{background:#8a5a1e;}
.sind{font-size:.72rem;color:var(--ix);font-style:italic;}
.mbar{background:#0f0e09;border-bottom:1px solid var(--brd);padding:0 1.4rem;display:flex;align-items:center;overflow-x:auto;scrollbar-width:none;}
.mbar::-webkit-scrollbar{display:none;}
.mtab{padding:9px 17px;border:none;background:transparent;font-family:'Crimson Pro',serif;font-size:.95rem;color:var(--if);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:all .15s;}
.mtab:hover{color:var(--p);}
.mtab.act{color:var(--p);font-weight:600;border-bottom-color:var(--amb);background:var(--bg);}
.madd{padding:9px 14px;border:none;background:transparent;color:var(--if);cursor:pointer;font-size:1.1rem;line-height:1;transition:color .15s;}
.madd:hover{color:var(--grn);}
.main{max-width:1100px;margin:0 auto;padding:1.2rem 1.4rem 3rem;}
.card{background:var(--s1);border:1px solid var(--bl);border-radius:8px;margin-bottom:.9rem;box-shadow:0 2px 8px var(--shd);}
.chdr{display:flex;align-items:center;justify-content:space-between;padding:.6rem 1rem;border-bottom:1px solid var(--bl);background:var(--s2);border-radius:8px 8px 0 0;}
.ctit{font-family:'IM Fell English',serif;font-size:.82rem;text-transform:uppercase;letter-spacing:.08em;color:var(--il);}
.cbdy{padding:.9rem 1rem;}
.collhdr{display:flex;align-items:center;justify-content:space-between;padding:.7rem 1rem;cursor:pointer;user-select:none;border-radius:8px;transition:background .1s;}
.collhdr:hover{background:var(--s2);}
.collhdr h2{font-family:'IM Fell English',serif;font-size:1rem;color:var(--p);}
.collhdr .sub{font-size:.78rem;color:var(--if);margin-left:7px;font-weight:400;font-family:'Crimson Pro',serif;}
.chev{font-size:.72rem;color:var(--if);transition:transform .2s;}
.chev.op{transform:rotate(180deg);}
.mgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(95px,1fr));gap:7px;margin-bottom:.85rem;}
.met{background:var(--s2);border:1px solid var(--bl);border-radius:4px;padding:.5rem .75rem;}
.mlbl{font-size:.68rem;color:var(--if);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;}
.mval{font-size:1.15rem;font-weight:600;}
.pos{color:var(--grn);}
.neg{color:var(--red);}
.dvc{color:var(--pur);}
.sbar{display:flex;align-items:center;gap:9px;margin-bottom:6px;}
.sbrlbl{font-size:.78rem;color:var(--if);width:125px;flex-shrink:0;}
.btrk{flex:1;height:7px;background:var(--pd);border-radius:4px;overflow:hidden;border:1px solid var(--bl);}
.bfil{height:100%;border-radius:4px;}
.bfil.hat{background:var(--red);}
.bfil.car{background:var(--grn);}
.sbrv{font-size:.83rem;font-weight:600;width:22px;text-align:right;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}
.fg4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:7px;}
.fga{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:7px;}
.full{grid-column:1/-1;}
.fld{display:flex;flex-direction:column;gap:2px;}
.flbl{font-size:.68rem;font-weight:600;color:var(--if);text-transform:uppercase;letter-spacing:.05em;}
input,select,textarea{width:100%;padding:5px 8px;border:1px solid var(--brd);border-radius:4px;background:var(--s3);color:var(--p);font-size:.88rem;font-family:'Crimson Pro',serif;transition:border-color .15s;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--amb);box-shadow:0 0 0 2px rgba(200,146,42,.15);}
textarea{resize:vertical;min-height:50px;}
.btn{padding:5px 13px;border-radius:4px;font-family:'Crimson Pro',serif;font-size:.88rem;cursor:pointer;border:1px solid;transition:all .15s;white-space:nowrap;}
.bpr{background:var(--amb);border-color:var(--amb);color:#0f0e09;font-weight:600;}
.bpr:hover{background:#e0a830;}
.bse{background:var(--s2);border-color:var(--brd);color:var(--p);}
.bse:hover{background:var(--s3);}
.bgh{background:transparent;border-color:var(--bl);color:var(--il);}
.bgh:hover{background:var(--s2);}
.bdn{background:transparent;border-color:#5a2020;color:var(--red);}
.bdn:hover{background:var(--rp);}
.bwn{background:transparent;border-color:#5a3e10;color:var(--amb);}
.bwn:hover{background:var(--ap);}
.bsm{padding:3px 8px;font-size:.78rem;}
.brow{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap;}
.div{height:1px;background:var(--bl);margin:9px 0;}
.badge{display:inline-flex;padding:2px 7px;border-radius:20px;font-size:.73rem;font-weight:600;white-space:nowrap;}
.bc{background:var(--rp);color:var(--red);border:1px solid #4a1818;}
.bb{background:var(--gp);color:var(--grn);border:1px solid #1e3a1e;}
.bn{background:var(--s2);color:var(--if);border:1px solid var(--bl);}
.braid,.bpill,.bband{background:var(--ap);color:var(--amb);border:1px solid #4a2e08;}
.bplun{background:var(--rp);color:var(--red);border:1px solid #4a1818;}
.bcimp{background:var(--bp);color:var(--blu);border:1px solid #1e2e48;}
.bcfor{background:var(--pp);color:var(--pur);border:1px solid #2e1e48;}
.bact{background:var(--gp);color:var(--grn);border:1px solid #1e3a1e;}
.bdam{background:var(--ap);color:var(--amb);border:1px solid #4a2e08;}
.bdst{background:var(--rp);color:var(--red);border:1px solid #4a1818;}
.bsea{background:var(--s2);color:var(--if);border:1px solid var(--bl);}
.bwin{background:var(--bp);color:var(--blu);border:1px solid #1e2e48;}
.hout{margin-top:9px;padding:9px 15px;border-radius:4px;font-size:.93rem;font-weight:600;text-align:center;font-family:'IM Fell English',serif;letter-spacing:.04em;}
.hoinc,.hoexc,.hogoo{background:var(--gp);color:var(--grn);border:1px solid #1e3a1e;}
.horeg{background:var(--s2);color:var(--if);border:1px solid var(--brd);}
.homer{background:var(--ap);color:var(--amb);border:1px solid #4a2e08;}
.hobad,.hovbad,.honeg{background:var(--rp);color:var(--red);border:1px solid #4a1818;}
.hopend{background:var(--s2);color:var(--if);border:1px solid var(--brd);font-family:'Crimson Pro',serif;font-weight:400;font-style:italic;}
.fatbox{background:var(--s2);border:1px solid var(--brd);border-radius:4px;padding:9px 13px;margin:7px 0;}
.fatr{display:flex;align-items:center;gap:9px;margin-bottom:5px;}
.fatl{font-size:.83rem;color:var(--il);flex:1;}
.fatnum{width:65px!important;text-align:center;}
.fatt{display:flex;justify-content:space-between;font-size:.88rem;font-weight:600;padding-top:6px;margin-top:3px;border-top:1px solid var(--brd);}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:7px;}
.tcrd{background:var(--s2);border:1px solid var(--bl);border-radius:4px;padding:9px 11px;}
.tcrd h4{font-size:.68rem;font-weight:600;color:var(--if);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px;font-family:'Crimson Pro',serif;}
.rrow{display:flex;gap:4px;flex-wrap:wrap;}
.rb{padding:3px 9px;border:1px solid var(--brd);border-radius:4px;background:var(--s3);cursor:pointer;font-size:.78rem;font-family:'Crimson Pro',serif;color:var(--il);transition:all .15s;}
.rb:hover{background:var(--s2);color:var(--p);}
.rb.sc{background:var(--gp);color:var(--grn);border-color:#2a4a2a;font-weight:600;}
.rb.ss{background:var(--bp);color:var(--blu);border-color:#1e2e48;font-weight:600;}
.rb.sf{background:var(--ap);color:var(--amb);border-color:#4a3010;font-weight:600;}
.rb.su{background:var(--rp);color:var(--red);border-color:#4a1818;font-weight:600;}
.tiebox{background:var(--ap);border:1px solid #5a3e10;border-radius:4px;padding:9px 13px;margin-top:7px;}
.tiebox p{font-size:.83rem;color:var(--amb);margin-bottom:7px;font-style:italic;}
.calcbox{background:var(--s2);border:1px solid var(--brd);border-radius:4px;padding:9px 13px;margin:7px 0;}
.cr{display:flex;justify-content:space-between;font-size:.86rem;padding:2px 0;color:var(--il);}
.cr.tot{font-weight:600;color:var(--p);border-top:1px solid var(--brd);padding-top:6px;margin-top:3px;font-size:.93rem;}
.icrd{border:1px solid var(--bl);border-radius:4px;overflow:hidden;margin-bottom:6px;}
.ichdr{display:flex;align-items:center;gap:7px;padding:7px 11px;background:var(--s2);cursor:pointer;flex-wrap:wrap;}
.icnam{font-size:.9rem;font-weight:600;flex:1;}
.icbdy{display:none;padding:9px 11px;background:var(--s1);}
.icbdy.op{display:block;}
.idgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px 14px;margin-bottom:7px;}
.idl{font-size:.68rem;color:var(--if);}
.idv{font-size:.86rem;}
.iact{display:flex;gap:4px;flex-wrap:wrap;margin-top:7px;padding-top:7px;border-top:1px solid var(--bl);}
.dmgcrd{border:1px solid #5a3e10;border-radius:4px;padding:7px 11px;margin-bottom:5px;background:var(--ap);}
.ltbl{border:1px solid var(--bl);border-radius:8px;overflow:hidden;}
.lhdr{display:grid;grid-template-columns:52px 88px 90px 1fr 72px 20px;gap:7px;padding:7px 1rem;background:var(--s2);border-bottom:1px solid var(--brd);font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--if);}
.lyr{border-bottom:1px solid var(--bl);}
.lyr:last-child{border-bottom:none;}
.lrow{display:grid;grid-template-columns:52px 88px 90px 1fr 72px 20px;gap:7px;padding:8px 1rem;align-items:center;cursor:pointer;font-size:.88rem;transition:background .1s;}
.lrow:hover{background:var(--s2);}
.lrow.ed{background:var(--s2);}
.ycell{font-weight:700;font-family:'IM Fell English',serif;}
.nprev{font-size:.78rem;color:var(--if);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tval{font-weight:600;text-align:right;}
.xicon{font-size:.68rem;color:var(--if);text-align:center;transition:transform .15s;}
.xicon.op{transform:rotate(180deg);}
.ldet{display:none;padding:0 1rem 11px;border-top:1px solid var(--bl);background:var(--s1);}
.ldet.op{display:block;}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:9px;}
.dsec{background:var(--s2);border:1px solid var(--bl);border-radius:4px;padding:9px 11px;}
.dsec h4{font-size:.68rem;font-weight:600;color:var(--if);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;font-family:'Crimson Pro',serif;}
.dln{display:flex;justify-content:space-between;font-size:.8rem;padding:2px 0;color:var(--il);}
.dln.sub{font-weight:600;color:var(--p);border-top:1px solid var(--bl);padding-top:4px;margin-top:3px;}
.egrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(125px,1fr));gap:5px;padding:7px 0;}
.efd{display:flex;flex-direction:column;gap:2px;}
.efd label{font-size:.67rem;color:var(--if);text-transform:uppercase;letter-spacing:.05em;}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:1000;align-items:center;justify-content:center;}
.modal.op{display:flex;}
.mbox{background:var(--s1);border:1px solid var(--brd);border-radius:8px;padding:1.4rem;width:min(460px,92vw);box-shadow:0 8px 28px rgba(0,0,0,.5);}
.mbox h3{font-family:'IM Fell English',serif;font-size:1.1rem;margin-bottom:.9rem;color:var(--p);}
.mbox p{font-size:.88rem;color:var(--il);margin-bottom:.9rem;}
.toast{position:fixed;bottom:1.4rem;right:1.4rem;background:var(--s2);color:var(--p);border:1px solid var(--brd);padding:9px 16px;border-radius:4px;font-size:.85rem;opacity:0;transform:translateY(8px);transition:all .22s;z-index:2000;pointer-events:none;}
.toast.sh{opacity:1;transform:translateY(0);}
.inote{font-size:.75rem;color:var(--if);font-style:italic;}
.sum-card{font-family:'Crimson Pro',Georgia,serif;background:#e8e0cc;border:2px solid #a89070;border-radius:8px;overflow:hidden;margin-bottom:12px;}
.sum-hdr{background:#1a1008;color:#e8e0cc;padding:10px 14px;display:flex;align-items:baseline;gap:10px;}
.sum-hdr h4{font-family:'IM Fell English',serif;font-size:1rem;margin:0;flex:1;}
.sum-hdr .sum-yr{font-size:.75rem;color:#a89070;font-style:italic;}
.sum-body{padding:10px 14px;}
.sum-row{display:flex;justify-content:space-between;font-size:.83rem;padding:2px 0;color:#3d2e18;}
.sum-row.sum-tot{font-weight:700;border-top:1px solid #a89070;padding-top:4px;margin-top:3px;color:#1a1008;}
.sum-section{margin-bottom:8px;}
.sum-section h5{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#6b5a3e;margin-bottom:4px;font-family:'Crimson Pro',serif;}
.sum-badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.sum-badge{display:inline-flex;padding:2px 8px;border-radius:20px;font-size:.72rem;font-weight:600;border:1px solid;}
.sum-bad-red{background:#ede0e0;color:#7a1212;border-color:#c8a0a0;}
.sum-bad-grn{background:#d8e8db;color:#14491f;border-color:#a0c8a8;}
.sum-bad-tan{background:#ede0cc;color:#6b4012;border-color:#c8a870;}
.sum-bad-gry{background:#e0dbd2;color:#6b5a3e;border-color:#a89070;}
.sum-note{font-size:.82rem;color:#3d2e18;font-style:italic;padding:5px 8px;background:rgba(255,255,255,.4);border-radius:4px;border-left:3px solid #a89070;}
.sum-all-hdr{background:#1a1008;color:#e8e0cc;padding:10px 16px;font-family:'IM Fell English',serif;font-size:1.1rem;text-align:center;letter-spacing:.04em;}

</style>
</head>
<body>
<header class="hdr">
  <div class="htitle">Pendragon <em>Manor Ledger</em></div>
  <div class="yrctl">
    <label>Year&nbsp;AD</label>
    <input class="yrinp" id="yrInp" type="number" value="498" min="400" max="700">
    <div class="yrarr">
      <button class="yra" onclick="adjYr(1)">&#9650;</button>
      <button class="yra" onclick="adjYr(-1)">&#9660;</button>
    </div>
  </div>
  <div class="hbtns">
    <span class="sind" id="sind">Saved</span>
    <button class="hb hbg" onclick="openYearSummary()">&#128196; Year Summary</button>
    <button class="hb hbg" onclick="exportData()">Export JSON</button>
    <label class="hb hbg" style="cursor:pointer">Import JSON<input type="file" accept=".json" style="display:none" onchange="importData(event)"></label>
    <button class="hb hbp" onclick="saveNow()">&#128190; Save</button>
  </div>
</header>
<nav class="mbar" id="mbar"></nav>
<main class="main" id="main"></main>

<div class="modal" id="modSum">
  <div class="mbox" style="width:min(680px,96vw);max-height:90vh;overflow-y:auto">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem">
      <h3 style="margin:0" id="sumTitle">Year Summary</h3>
      <div style="display:flex;gap:6px;align-items:center">
        <label style="font-size:.75rem;color:var(--if)">Year:</label>
        <select id="sumYrSel" onchange="renderSummary()" style="width:80px;font-size:.85rem;padding:3px 6px"></select>
        <button class="btn bpr bsm" onclick="exportSummaryImage()">&#128247; Export PNG</button>
        <button class="btn bgh bsm" onclick="exportSummaryHTML()">&#128229; Export HTML</button>
        <button class="btn bgh bsm" onclick="closeM('modSum')">Close</button>
      </div>
    </div>
    <div id="sumBody"></div>
  </div>
</div>


<div class="modal" id="modYrPick">
  <div class="mbox" style="width:min(340px,92vw)">
    <h3>Export Year as PNG</h3>
    <p id="yrPickManor" style="font-weight:600;margin-bottom:.5rem"></p>
    <div class="fld" style="margin-bottom:11px">
      <span class="flbl">Select year</span>
      <select id="yrPickSel" style="margin-top:4px"></select>
    </div>
    <div class="brow">
      <button class="btn bpr" onclick="doYrPickExport()">&#128247; Export PNG</button>
      <button class="btn bgh" onclick="closeM('modYrPick')">Cancel</button>
    </div>
  </div>
</div>

<div class="modal" id="modAdd">
  <div class="mbox">
    <h3>Add New Manor</h3>
    <p>Creates with 10 librum base harvest, Normal lifestyle, and blank fields. Edit details in the status card.</p>
    <div class="fld" style="margin-bottom:11px"><span class="flbl">Manor name</span><input id="newName" placeholder="e.g. Salisbury"></div>
    <div class="brow">
      <button class="btn bpr" onclick="doAddManor()">Add Manor</button>
      <button class="btn bgh" onclick="closeM('modAdd')">Cancel</button>
    </div>
  </div>
</div>

<div class="modal" id="modDel">
  <div class="mbox">
    <h3>Delete Manor</h3>
    <p id="delMsg"></p>
    <div class="fld" style="margin-bottom:11px"><span class="flbl">Type manor name to confirm</span><input id="delConf" placeholder=""></div>
    <div class="brow">
      <button class="btn bdn" onclick="doDelManor()">Delete permanently</button>
      <button class="btn bgh" onclick="closeM('modDel')">Cancel</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONSTANTS ─────────────────────────────────────────────────────────────
const HM={'Incredible':2.5,'Excellent':2,'Good':1.5,'Regular':1,'Meager':0.75,'Bad':0.5,'Very Bad':0.25,'Negligible':1/6};
const LC={'Impoverished Knight':0,'Poor Knight':2,'Normal':4,'Rich':8,'Extravagant':18};
const LUCKS=['No Result','Calamity','Boon'];
const CONFLICTS=['No Result','Bandits','Raided','Pillaged','Plundered'];
const SEASONS=['—','Spring','Summer','Fall','Winter'];

function g(id){return document.getElementById(id);}
function cm(v){return state;} // unused
function cur(){return S.manors[S.currentManor];}
function toast(m){const t=g('toast');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2200);}
function openM(id){g(id).classList.add('op');}
function closeM(id){g(id).classList.remove('op');}
function sopts(arr,val){return arr.map(o=>`<option${o===val?' selected':''}>${o}</option>`).join('');}
function adjYr(d){const v=parseInt(g('yrInp').value)||498;g('yrInp').value=v+d;S.currentYear=v+d;markDirty();}
g('yrInp').addEventListener('change',function(){S.currentYear=parseInt(this.value)||498;markDirty();});

function bclass(v){if(!v)return'bn';const l=v.toLowerCase();if(l==='calamity')return'bc';if(l==='boon')return'bb';if(l.includes('plundered'))return'bplun';if(l.includes('pillaged'))return'bpill';if(l.includes('raided'))return'braid';if(l.includes('bandits'))return'bband';return'bn';}
function ftot(s){return(+s.fateWeather||0)+(+s.fateConflict||0)+(+s.fateCommoners||0)+(+s.fatePresence||0)+(+s.fateMisc||0);}
function amaint(m){return m.improvements.filter(i=>i.status!=='destroyed').reduce((s,i)=>s+(+i.maintenance||0),0);}
function tdv(m){return m.improvements.filter(i=>i.cat==='fortification'&&i.status==='active').reduce((s,i)=>s+(+i.dvMod||0),0);}
function lastT(m){return m.history.length?m.history[m.history.length-1].treasury:0;}
function nextYr(m){return m.history.length?m.history[m.history.length-1].year+1:S.currentYear;}
function calcT(wp,m){const outcome=wp.harvestOutcome||wp.harvest||'Regular';const mult=HM[outcome]||1;const hi=Math.round((m.baseHarvest||10)*mult);const inc=(+wp.stewardIndustry||0)+(+wp.improvIncome||0)+(+wp.discretionary||0)+(+wp.extraManorial||0)+(+wp.miscIncome||0);const lc=LC[wp.lifestyle]||4;const exp=lc+(+wp.improvMaint||0)+(+wp.familyCost||0)+(+wp.improvBuild||0)+(+wp.miscExp||0);return{hi,inc,lc,exp,total:Math.round((hi+inc+(+wp.prevTreasury||0)-exp)*10)/10};}
function sbadge(s){if(!s||s==='—')return'';const cl=s==='Winter'?'bwin':'bsea';return`<span class="badge ${cl}">${s}</span>`;}
function hocl(o){if(!o||o==='—')return'';const k=o.replace(' ','').toLowerCase();const m={'incredible':'hoinc','excellent':'hoexc','good':'hogoo','regular':'horeg','meager':'homer','bad':'hobad','verybad':'hovbad','negligible':'honeg'};return m[k]||'horeg';}
function hhtml(o){if(o&&o!=='—')return`<div class="hout ${hocl(o)}">Harvest: ${o}</div>`;return`<div class="hout hopend">Select both test results to determine harvest</div>`;}
function lookup(s,f,tb){if(!s||s==='—'||!f||f==='—')return null;const b=(HT[s]||{})[f];if(b===null){if(!tb||tb==='—')return null;return tb==='wt'?'Regular':'Meager';}return b||null;}
function needsTB(s,f){return s==='Success'&&f==='Success';}

// ── ENTRY FORM ────────────────────────────────────────────────────────────
function getWP(mn){if(!WP[mn])resetWP(mn);return WP[mn];}
function resetWP(mn){const m=S.manors[mn];if(!m)return;const last=m.history[m.history.length-1];WP[mn]={harvest:'Regular',lifestyle:m.lifestyle||'Normal',stewardIndustry:0,improvIncome:0,discretionary:0,extraManorial:0,miscIncome:0,improvMaint:amaint(m),familyCost:4,improvBuild:0,miscExp:0,luckResult:'No Result',luckSeason:'—',conflictResult:'No Result',conflictSeason:'—',notes:'',notes2:'',prevTreasury:last?last.treasury:0,fateWeather:0,fateConflict:0,fateCommoners:0,fatePresence:0,fateMisc:0,stewardResult:'—',fateResult:'—',tiebreaker:'—',harvestOutcome:null};}
function setTR(mn,who,val){const wp=getWP(mn);wp[who]=val;if(who==='stewardResult'||who==='fateResult'){if(!needsTB(wp.stewardResult,wp.fateResult))wp.tiebreaker='—';wp.harvestOutcome=lookup(wp.stewardResult,wp.fateResult,wp.tiebreaker);}renderAll();}
function setTB(mn,val){const wp=getWP(mn);wp.tiebreaker=val;wp.harvestOutcome=lookup(wp.stewardResult,wp.fateResult,val);renderAll();}
function readEF(mn){
  const wp=getWP(mn);
  ['stewardIndustry','improvIncome','discretionary','extraManorial','miscIncome','improvMaint','familyCost','improvBuild','miscExp'].forEach(k=>{const e=g('fi_'+mn+'_'+k);if(e)wp[k]=parseFloat(e.value)||0;});
  ['fateWeather','fateConflict','fateCommoners','fatePresence','fateMisc'].forEach(k=>{const e=g('fi_'+mn+'_'+k);if(e)wp[k]=parseFloat(e.value)||0;});
  const ls=g('fi_'+mn+'_ls');if(ls)wp.lifestyle=ls.value;
  const lr=g('fi_'+mn+'_lk');if(lr)wp.luckResult=lr.value;
  const ls2=g('fi_'+mn+'_lks');if(ls2)wp.luckSeason=ls2.value;
  const cr=g('fi_'+mn+'_co');if(cr)wp.conflictResult=cr.value;
  const cs=g('fi_'+mn+'_cos');if(cs)wp.conflictSeason=cs.value;
  const n1=g('fi_'+mn+'_n1');if(n1)wp.notes=n1.value;
  const n2=g('fi_'+mn+'_n2');if(n2)wp.notes2=n2.value;
}
function updCalc(mn){
  readEF(mn);const wp=getWP(mn);const m=S.manors[mn];const t=calcT(wp,m);
  const el=g('cp_'+mn);if(el)el.innerHTML=calcRows(t,wp);
  const ft=g('ft_'+mn);if(ft)ft.textContent=ftot(wp);
}
function calcRows(t,wp){const nc=t.total>=0?'pos':'neg';return`<div class="cr"><span>Harvest income</span><span>${t.hi}L</span></div><div class="cr"><span>Other income</span><span>${t.inc.toFixed(1)}L</span></div><div class="cr"><span>Treasury in</span><span>${wp.prevTreasury}L</span></div><div class="cr"><span>Total expenses</span><span style="color:var(--red)">${t.exp.toFixed(1)}L</span></div><div class="cr tot"><span>New treasury rollover</span><span class="${nc}">${t.total.toFixed(1)}L</span></div>`;}
function commitYr(mn){
  readEF(mn);const m=S.manors[mn];const wp=getWP(mn);const t=calcT(wp,m);const ny=nextYr(m);
  m.history.push({year:ny,luck:wp.luckResult,luckSeason:wp.luckSeason,conflict:wp.conflictResult,conflictSeason:wp.conflictSeason,prevTreasury:wp.prevTreasury,harvestResult:wp.harvestOutcome||wp.harvest,harvestIncome:t.hi,stewardIndustry:+wp.stewardIndustry||0,improvIncome:+wp.improvIncome||0,discretionary:+wp.discretionary||0,extraManorial:+wp.extraManorial||0,miscIncome:+wp.miscIncome||0,lifestyle:wp.lifestyle,lifestyleCost:LC[wp.lifestyle]||4,improvMaint:+wp.improvMaint||0,family:+wp.familyCost||0,improvBuild:+wp.improvBuild||0,miscExp:+wp.miscExp||0,treasury:t.total,notes:wp.notes,notes2:wp.notes2,fateWeather:+wp.fateWeather||0,fateConflict:+wp.fateConflict||0,fateCommoners:+wp.fateCommoners||0,fatePresence:+wp.fatePresence||0,fateMisc:+wp.fateMisc||0,stewardResult:wp.stewardResult||'—',fateResult:wp.fateResult||'—',tiebreaker:wp.tiebreaker||'—',harvestOutcome:wp.harvestOutcome||'—'});
  U.fo[mn]=false;resetWP(mn);markDirty();renderAll();toast('Year '+ny+' committed');
}
function saveEdit(mn,yr){
  const m=S.manors[mn];const r=m.history.find(h=>h.year===yr);if(!r)return;
  const str=['luck','luckSeason','conflict','conflictSeason','harvestResult','lifestyle','notes','notes2','stewardResult','fateResult','tiebreaker','harvestOutcome'];
  ['luck','luckSeason','conflict','conflictSeason','harvestResult','harvestIncome','stewardIndustry','improvIncome','discretionary','extraManorial','miscIncome','lifestyleCost','improvMaint','family','improvBuild','miscExp','treasury','notes','notes2','fateWeather','fateConflict','fateCommoners','fatePresence','fateMisc','stewardResult','fateResult','tiebreaker','harvestOutcome'].forEach(f=>{const e=g('ed_'+mn+'_'+yr+'_'+f);if(e){const v=e.value;r[f]=str.includes(f)?v:(!isNaN(v)&&v!==''?parseFloat(v):v);}});

        <button class="btn bwn bsm" onclick="const id=Date.now();S.manors['${mn}'].propertyDamage.push({id,description:'',repairCost:'',yearFixed:'',status:'damaged'});U.df['${mn}'][id]=true;renderAll()">+ Log property damage</button>

    bg:'#1c1a14',s1:'#252318',s2:'#2e2b1e',s3:'#363224',
    brd:'#4a4535',bl:'#3d3928',
    p:'#e8dfc8',pd:'#c8bfa8',il:'#c8bfa8',dim:'#9a9080',vdim:'#7a7060',
    amb:'#c8922a',red:'#c85050',grn:'#5a9c6a',blu:'#5882a8',pur:'#8868b8',
    badRedBg:'#281818',badRedFg:'#c85050',badRedBd:'#4a1818',
    badGrnBg:'#182418',badGrnFg:'#5a9c6a',badGrnBd:'#1e3a1e',
    badTanBg:'#2e2418',badTanFg:'#c8922a',badTanBd:'#4a2e08',
    badGryBg:'#2e2b1e',badGryFg:'#9a9080',badGryBd:'#3d3928',
    badBluBg:'#181c28',badBluFg:'#5882a8',badBluBd:'#1e2e48',
    badPurBg:'#1e1828',badPurFg:'#8868b8',badPurBd:'#2e1e48',
  };
}
function _hcls(C,ho){
  if(['Incredible','Excellent','Good'].includes(ho))return[C.badGrnBg,C.badGrnFg,C.badGrnBd];
  if(['Meager','Bad'].includes(ho))return[C.badTanBg,C.badTanFg,C.badTanBd];
  if(['Very Bad','Negligible'].includes(ho))return[C.badRedBg,C.badRedFg,C.badRedBd];
  return[C.badGryBg,C.badGryFg,C.badGryBd];
}
function _lcls(C,luck){return luck==='Boon'?[C.badGrnBg,C.badGrnFg,C.badGrnBd]:luck==='Calamity'?[C.badRedBg,C.badRedFg,C.badRedBd]:[C.badGryBg,C.badGryFg,C.badGryBd];}
function _ccls(C,c){return['Plundered','Pillaged'].includes(c)?[C.badRedBg,C.badRedFg,C.badRedBd]:['Raided','Bandits'].includes(c)?[C.badTanBg,C.badTanFg,C.badTanBd]:[C.badGryBg,C.badGryFg,C.badGryBd];}
function _badge(ctx,x,y,text,bgc,fgc,bdc,fs,SC){
  fs=fs||10;SC=SC||2;
  ctx.font=`bold ${fs*SC}px sans-serif`;
  const tw=ctx.measureText(text).width;
  const bw=tw+10*SC,bh=(fs+8)*SC,br=(fs+8)/2*SC;
  ctx.fillStyle=bgc;ctx.strokeStyle=bdc;ctx.lineWidth=SC;
  ctx.beginPath();ctx.roundRect(x,y,bw,bh,br);ctx.fill();ctx.stroke();
  ctx.fillStyle=fgc;ctx.fillText(text,x+5*SC,y+(fs+1)*SC);
  return bw+5*SC;
}

function openYrPick(mn){
  U._yrPickMn=mn;
  g('yrPickManor').textContent=mn;
  const years=S.manors[mn].history.map(h=>h.year).sort((a,b)=>b-a);
  g('yrPickSel').innerHTML=years.map(y=>`<option value="${y}">${y} AD</option>`).join('');
  openM('modYrPick');
}
function doYrPickExport(){
  const mn=U._yrPickMn;
  const yr=parseInt(g('yrPickSel').value);
  closeM('modYrPick');

}

function exportManorImage(mn){
  const m=S.manors[mn];
  if(!m){toast('No manor data');return;}

  const SC=2,C=_canvasColors();
  const W=640,PAD=20,IW=W-PAD*2;
  function sf(s){return s*SC;}

  const dv=tdv(m);
  const treas=lastT(m);
  const improvs=m.improvements.filter(i=>i.status!=='destroyed');
  const damaged=m.propertyDamage.filter(d=>d.status!=='repaired');

  // Current year = most recent history entry; prior = one before that
  const sortedHist=[...m.history].sort((a,b)=>b.year-a.year);
  const recentRows=sortedHist.slice(0,2); // current + prior

  // ── measure improvements height accurately ────────────────────────────────
  // Each imp: 1 main line (14px) + notes line if present (13px) + 4px gap
  const IMP_LINE=14,IMP_NOTE=13,IMP_GAP=4;
  function impRowH(imp){return IMP_LINE+(imp.notes?IMP_NOTE:0)+IMP_GAP;}
  const IMPS_INNER=improvs.reduce((s,i)=>s+impRowH(i),0);
  const IMPS_H=improvs.length?(20+IMPS_INNER+6):0;

  const DMG_LINE=16;
  const DMG_H=damaged.length?(20+damaged.length*DMG_LINE+6):0;

  const HEADER_H=70;
  const STATUS_H=22+30+14+14+(m.notes?20:0)+8; // label strip + stat cols + 2 bars + note + pad
  const RECENT_LABEL_H=20;
  const RECENT_ROW_H=72; // each mini year card
  const RECENT_H=RECENT_LABEL_H+recentRows.length*RECENT_ROW_H+(recentRows.length-1)*8;

  const TOTAL=PAD+HEADER_H+PAD+STATUS_H+PAD
    +(IMPS_H?IMPS_H+PAD:0)
    +(DMG_H?DMG_H+PAD:0)
    +RECENT_H+PAD;

  const canvas=document.createElement('canvas');
  canvas.width=sf(W);canvas.height=sf(TOTAL);
  const ctx=canvas.getContext('2d');
  ctx.fillStyle=C.bg;ctx.fillRect(0,0,canvas.width,canvas.height);

  let y=PAD;

  // ── section block (draws bg+header strip, does NOT advance y) ────────────
  function secBlock(title,height){
    ctx.fillStyle=C.s1;ctx.strokeStyle=C.brd;ctx.lineWidth=SC;
    ctx.beginPath();ctx.roundRect(sf(PAD),sf(y),sf(IW),sf(height),sf(6));ctx.fill();ctx.stroke();
    ctx.fillStyle=C.s2;
    ctx.beginPath();ctx.roundRect(sf(PAD),sf(y),sf(IW),sf(18),[sf(6),sf(6),0,0]);ctx.fill();
    ctx.strokeStyle=C.bl;ctx.lineWidth=SC;
    ctx.beginPath();ctx.moveTo(sf(PAD),sf(y+18));ctx.lineTo(sf(PAD+IW),sf(y+18));ctx.stroke();
    ctx.fillStyle=C.dim;ctx.font=`bold ${sf(9)}px sans-serif`;
    ctx.fillText(title.toUpperCase(),sf(PAD+10),sf(y+13));
  }
  function bar(label,val,max,fillColor){
    ctx.fillStyle=C.dim;ctx.font=`${sf(10)}px sans-serif`;
    ctx.fillText(label,sf(PAD+10),sf(y+9));
    const bx=sf(PAD+115),bw=sf(IW-130),bh=sf(7),by=sf(y+3);
    ctx.fillStyle=C.s2;ctx.strokeStyle=C.bl;ctx.lineWidth=SC;
    ctx.beginPath();ctx.roundRect(bx,by,bw,bh,sf(3));ctx.fill();ctx.stroke();
    const pct=Math.min(val/max,1);
    if(pct>0){ctx.fillStyle=fillColor;ctx.beginPath();ctx.roundRect(bx,by,bw*pct,bh,sf(3));ctx.fill();}
    ctx.fillStyle=C.p;ctx.font=`bold ${sf(10)}px sans-serif`;
    ctx.fillText(String(val),sf(PAD+IW-10)-ctx.measureText(String(val)).width,sf(y+10));
    y+=14;
  }

  // ── HEADER ────────────────────────────────────────────────────────────────
  ctx.fillStyle=C.s2;ctx.strokeStyle=C.amb;ctx.lineWidth=sf(2);
  ctx.beginPath();ctx.roundRect(sf(PAD),sf(y),sf(IW),sf(HEADER_H),sf(8));ctx.fill();ctx.stroke();
  ctx.fillStyle=C.amb;ctx.font=`bold ${sf(9)}px sans-serif`;
  ctx.fillText('PENDRAGON MANOR LEDGER',sf(PAD+14),sf(y+16));
  ctx.fillStyle=C.p;ctx.font=`bold ${sf(22)}px 'Times New Roman',serif`;
  ctx.fillText(mn,sf(PAD+14),sf(y+40));
  const sub=[m.knight,m.player,m.faction&&m.faction!=='—'?m.faction:null].filter(Boolean).join(' · ');
  ctx.fillStyle=C.dim;ctx.font=`${sf(11)}px serif`;
  ctx.fillText(sub,sf(PAD+14),sf(y+56));
  const trstr=treas.toFixed(1)+'L';
  ctx.fillStyle=treas>=0?C.grn:C.red;ctx.font=`bold ${sf(18)}px serif`;
  ctx.fillText(trstr,sf(PAD+IW-14)-ctx.measureText(trstr).width,sf(y+42));
  ctx.fillStyle=C.dim;ctx.font=`${sf(9)}px sans-serif`;
  const tlbl='Treasury';ctx.fillText(tlbl,sf(PAD+IW-14)-ctx.measureText(tlbl).width,sf(y+28));
  y+=HEADER_H+PAD;

  // ── STATUS ────────────────────────────────────────────────────────────────
  secBlock('Current Status',STATUS_H);
  y+=22;
  const statItems=[['Base Harvest',m.baseHarvest+'L',C.p],['Lifestyle',m.lifestyle,C.p]];
  if(dv>0)statItems.push(['Total DV','+'+dv,C.pur]);
  const colW=IW/statItems.length;
  statItems.forEach(([lbl,val,vc],i)=>{
    const cx=PAD+10+i*colW;
    ctx.fillStyle=C.dim;ctx.font=`${sf(9)}px sans-serif`;ctx.fillText(lbl,sf(cx),sf(y+9));
    ctx.fillStyle=vc;ctx.font=`bold ${sf(13)}px serif`;ctx.fillText(val,sf(cx),sf(y+23));
  });
  y+=30;
  bar('Hatred (landlord)',m.hatred,30,C.red);
  bar('Care (commoners)',m.care,30,C.grn);
  if(m.notes){
    ctx.fillStyle='rgba(200,146,42,0.12)';ctx.strokeStyle=C.amb;ctx.lineWidth=SC;
    ctx.beginPath();ctx.roundRect(sf(PAD+10),sf(y),sf(IW-20),sf(16),sf(3));ctx.fill();
    ctx.fillStyle=C.amb;ctx.fillRect(sf(PAD+10),sf(y),sf(3),sf(16));
    ctx.fillStyle=C.pd;ctx.font=`italic ${sf(10)}px serif`;
    let nt=m.notes;
    while(ctx.measureText(nt).width>sf(IW-38)&&nt.length>4)nt=nt.slice(0,-1);
    if(nt!==m.notes)nt=nt.slice(0,-1)+'…';
    ctx.fillText(nt,sf(PAD+16),sf(y+11));
    y+=20;
  }
  y+=PAD;

  // ── IMPROVEMENTS ─────────────────────────────────────────────────────────
  if(improvs.length){
    secBlock('Improvements & Fortifications',IMPS_H);
    y+=22;
    improvs.forEach(imp=>{
      // line 1: name + category badge + income note + maint
      let bx=sf(PAD+10);
      ctx.fillStyle=C.p;ctx.font=`bold ${sf(11)}px serif`;
      ctx.fillText(imp.name,bx,sf(y+IMP_LINE-3));
      bx+=ctx.measureText(imp.name).width+sf(6);
      const isFort=imp.cat==='fortification';
      bx+=_badge(ctx,bx,sf(y+1),imp.cat,...(isFort?[C.badPurBg,C.badPurFg,C.badPurBd]:[C.badBluBg,C.badBluFg,C.badBluBd]),9,SC);
      if(imp.incomeNote){
        ctx.fillStyle=C.grn;ctx.font=`${sf(10)}px sans-serif`;
        ctx.fillText(imp.incomeNote,bx,sf(y+IMP_LINE-3));bx+=ctx.measureText(imp.incomeNote).width+sf(6);
      }
      if(imp.maintenance){
        ctx.fillStyle=C.dim;ctx.font=`${sf(10)}px sans-serif`;
        ctx.fillText(imp.maintenance+'L/yr maint',bx,sf(y+IMP_LINE-3));
      }
      y+=IMP_LINE;
      // line 2: notes (if any)
      if(imp.notes){
        ctx.fillStyle=C.vdim;ctx.font=`italic ${sf(9)}px sans-serif`;
        let nt=imp.notes;
        while(ctx.measureText(nt).width>sf(IW-24)&&nt.length>4)nt=nt.slice(0,-1);
        if(nt!==imp.notes)nt=nt.slice(0,-1)+'…';
        ctx.fillText(nt,sf(PAD+14),sf(y+IMP_NOTE-3));
        y+=IMP_NOTE;
      }
      y+=IMP_GAP;
    });
    y+=PAD;
  }

  // ── PROPERTY DAMAGE ───────────────────────────────────────────────────────
  if(damaged.length){
    secBlock('Outstanding Property Damage',DMG_H);
    y+=22;
    damaged.forEach(d=>{
      ctx.fillStyle=C.amb;ctx.font=`bold ${sf(11)}px serif`;
      let dtxt=d.description;
      while(ctx.measureText(dtxt).width>sf(IW-100)&&dtxt.length>4)dtxt=dtxt.slice(0,-1);
      if(dtxt!==d.description)dtxt=dtxt.slice(0,-1)+'…';
      ctx.fillText(dtxt,sf(PAD+10),sf(y+11));
      if(d.repairCost){
        ctx.fillStyle=C.dim;ctx.font=`${sf(10)}px sans-serif`;
        const rt='Est. repair: '+d.repairCost+'L';
        ctx.fillText(rt,sf(PAD+IW-10)-ctx.measureText(rt).width,sf(y+11));
      }
      y+=DMG_LINE;
    });
    y+=PAD;
  }

  // ── RECENT YEARS ─────────────────────────────────────────────────────────
  // Section label (no block bg — just a dim label)
  ctx.fillStyle=C.vdim;ctx.font=`bold ${sf(9)}px sans-serif`;
  ctx.fillText(recentRows.length>1?'CURRENT & PRIOR YEAR':'CURRENT YEAR',sf(PAD+10),sf(y+10));
  y+=RECENT_LABEL_H;

  recentRows.forEach((r,ri)=>{
    if(ri>0)y+=8;
    _drawYearCard(ctx,r,m,sf,SC,C,PAD,IW,y,RECENT_ROW_H);
    y+=RECENT_ROW_H;
  });
  y+=PAD;

  canvas.toBlob(blob=>{
    const u=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=u;a.download=`${mn.toLowerCase().replace(/\s+/g,'_')}_manor.png`;a.click();
    URL.revokeObjectURL(u);
    toast(mn+' exported as PNG');
  },'image/png');
}

// ── draw a single year card onto ctx at logical y ─────────────────────────
function _drawYearCard(ctx,r,m,sf,SC,C,PAD,IW,y,cardH){
  const ho=r.harvestOutcome&&r.harvestOutcome!=='—'?r.harvestOutcome:r.harvestResult||'—';
  const ti=(r.harvestIncome||0)+(r.stewardIndustry||0)+(r.improvIncome||0)+(r.discretionary||0)+(r.extraManorial||0)+(r.miscIncome||0)+(r.prevTreasury||0);
  const te=(r.lifestyleCost||0)+(r.improvMaint||0)+(r.family||0)+(r.improvBuild||0)+(r.miscExp||0);
  const net=r.treasury||0;
  const an=[r.notes,r.notes2].filter(Boolean).join(' — ');
  const C2=C||_canvasColors();

  // card bg
  ctx.fillStyle=C2.s1;ctx.strokeStyle=C2.brd;ctx.lineWidth=SC;
  ctx.beginPath();ctx.roundRect(sf(PAD),sf(y),sf(IW),sf(cardH),sf(6));ctx.fill();ctx.stroke();
  // header strip
  ctx.fillStyle=C2.s2;
  ctx.beginPath();ctx.roundRect(sf(PAD),sf(y),sf(IW),sf(20),[sf(6),sf(6),0,0]);ctx.fill();
  ctx.strokeStyle=C2.bl;ctx.lineWidth=SC;
  ctx.beginPath();ctx.moveTo(sf(PAD),sf(y+20));ctx.lineTo(sf(PAD+IW),sf(y+20));ctx.stroke();
  // year label
  ctx.fillStyle=C2.p;ctx.font=`bold ${sf(14)}px 'Times New Roman',serif`;
  ctx.fillText(r.year+' AD',sf(PAD+10),sf(y+15));
  // net treasury top-right
  const netstr=net.toFixed(1)+'L';
  ctx.fillStyle=net>=0?C2.grn:C2.red;ctx.font=`bold ${sf(13)}px serif`;
  ctx.fillText(netstr,sf(PAD+IW-10)-ctx.measureText(netstr).width,sf(y+15));

  // badges row
  let bx=sf(PAD+10),by=sf(y+24);
  bx+=_badge(ctx,bx,by,'Harvest: '+ho,..._hcls(C2,ho),9,SC);
  bx+=_badge(ctx,bx,by,r.luck,..._lcls(C2,r.luck),9,SC);
  if(r.conflict!=='No Result'){
    const ct=r.conflict+(r.conflictSeason&&r.conflictSeason!=='—'?' ('+r.conflictSeason+')':'');
    _badge(ctx,bx,by,ct,..._ccls(C2,r.conflict),9,SC);
  }

  // finance mini-row
  const fy=y+44;
  const fcols=[
    ['Harvest',r.harvestIncome.toFixed(1)+'L',C2.il],
    ['Income',ti.toFixed(1)+'L',C2.il],
    ['Expenses',te.toFixed(1)+'L',C2.red],
    ['Treasury',net.toFixed(1)+'L',net>=0?C2.grn:C2.red],
  ];
  const fw=IW/fcols.length;
  fcols.forEach(([lbl,val,vc],i)=>{
    const cx=PAD+10+i*fw;
    ctx.fillStyle=C2.vdim;ctx.font=`${sf(8)}px sans-serif`;
    ctx.fillText(lbl.toUpperCase(),sf(cx),sf(fy+8));
    ctx.fillStyle=vc;ctx.font=`bold ${sf(11)}px serif`;
    ctx.fillText(val,sf(cx),sf(fy+20));
  });

  // notes
  if(an){
    const ny=y+cardH-14;
    ctx.fillStyle='rgba(200,146,42,0.10)';ctx.strokeStyle=C2.amb;ctx.lineWidth=SC;
    ctx.beginPath();ctx.roundRect(sf(PAD+10),sf(ny),sf(IW-20),sf(12),sf(2));ctx.fill();
    ctx.fillStyle=C2.amb;ctx.fillRect(sf(PAD+10),sf(ny),sf(3),sf(12));
    ctx.fillStyle=C2.pd;ctx.font=`italic ${sf(9)}px serif`;
    let nt=an;
    while(ctx.measureText(nt).width>sf(IW-36)&&nt.length>4)nt=nt.slice(0,-1);
    if(nt!==an)nt=nt.slice(0,-1)+'…';
    ctx.fillText(nt,sf(PAD+16),sf(ny+9));
  }
}

// ── export a single year for a specific manor as PNG ─────────────────────
function exportManorYearImage(mn,yr){
  const m=S.manors[mn];
  if(!m){toast('No manor data');return;}
  const r=m.history.find(h=>h.year===yr);
  if(!r){toast('No record for '+yr);return;}

  const SC=2,C=_canvasColors();
  const W=600,PAD=20,IW=W-PAD*2;
  function sf(s){return s*SC;}

  const HEADER_H=56,CARD_H=88,TOTAL=PAD+HEADER_H+PAD+CARD_H+PAD;

  const canvas=document.createElement('canvas');
  canvas.width=sf(W);canvas.height=sf(TOTAL);
  const ctx=canvas.getContext('2d');
  ctx.fillStyle=C.bg;ctx.fillRect(0,0,canvas.width,canvas.height);

  let y=PAD;

  // banner
  ctx.fillStyle=C.s2;ctx.strokeStyle=C.amb;ctx.lineWidth=sf(2);
  ctx.beginPath();ctx.roundRect(sf(PAD),sf(y),sf(IW),sf(HEADER_H),sf(8));ctx.fill();ctx.stroke();
  ctx.fillStyle=C.amb;ctx.font=`bold ${sf(9)}px sans-serif`;
  ctx.fillText('PENDRAGON MANOR LEDGER',sf(PAD+14),sf(y+14));
  ctx.fillStyle=C.p;ctx.font=`bold ${sf(18)}px 'Times New Roman',serif`;
  ctx.fillText(mn,sf(PAD+14),sf(y+34));
  const sub=[m.knight,m.player].filter(Boolean).join(' · ');
  ctx.fillStyle=C.dim;ctx.font=`${sf(10)}px serif`;
  ctx.fillText(sub,sf(PAD+14),sf(y+48));
  y+=HEADER_H+PAD;

  _drawYearCard(ctx,r,m,sf,SC,C,PAD,IW,y,CARD_H);

  canvas.toBlob(blob=>{
    const u=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=u;a.download=`${mn.toLowerCase().replace(/\s+/g,'_')}_${yr}.png`;a.click();
    URL.revokeObjectURL(u);
    toast(mn+' '+yr+' AD exported');
  },'image/png');
}

// ── MANOR HTML EXPORT ─────────────────────────────────────────────────────
function exportManorHTML(mn){
  const m=S.manors[mn];
  if(!m){toast('No manor data');return;}
  const dv=tdv(m);
  const improvs=m.improvements.filter(i=>i.status!=='destroyed');
  const damaged=m.propertyDamage.filter(d=>d.status!=='repaired');

  const histRows=[...m.history].reverse().map(r=>{
    const ti=(r.harvestIncome||0)+(r.stewardIndustry||0)+(r.improvIncome||0)+(r.discretionary||0)+(r.extraManorial||0)+(r.miscIncome||0)+(r.prevTreasury||0);
    const te=(r.lifestyleCost||0)+(r.improvMaint||0)+(r.family||0)+(r.improvBuild||0)+(r.miscExp||0);
    const ho=r.harvestOutcome&&r.harvestOutcome!=='—'?r.harvestOutcome:r.harvestResult||'—';
    const hcl={'Incredible':'sum-bad-grn','Excellent':'sum-bad-grn','Good':'sum-bad-grn','Regular':'sum-bad-gry','Meager':'sum-bad-tan','Bad':'sum-bad-tan','Very Bad':'sum-bad-red','Negligible':'sum-bad-red'}[ho]||'sum-bad-gry';
    const lcl=r.luck==='Boon'?'sum-bad-grn':r.luck==='Calamity'?'sum-bad-red':'sum-bad-gry';
    const an=[r.notes,r.notes2].filter(Boolean).join(' — ');
    const netcol=(r.treasury||0)>=0?'#5a9c6a':'#c85050';
    return`<tr>
      <td style="font-weight:700;font-family:'IM Fell English',serif">${r.year}</td>
      <td><span class="sum-badge ${lcl}">${r.luck}</span></td>

      <td style="font-size:.78rem;color:#9a9080">${an||'—'}</td>
    </tr>`;
  }).join('');

  const impCards=improvs.map(i=>`<div class="imp-card">
    <strong>${i.name}</strong>
    <span class="sum-badge ${i.cat==='fortification'?'sum-bad-pur':'sum-bad-blu'}" style="margin-left:6px">${i.cat}</span>
    ${i.incomeNote?`<span style="color:#5a9c6a;font-size:.8rem;margin-left:6px">${i.incomeNote}</span>`:''}
    ${i.maintenance?`<span style="color:#9a9080;font-size:.8rem"> &middot; ${i.maintenance}L/yr maint</span>`:''}
    ${i.notes?`<div style="font-size:.78rem;color:#9a9080;margin-top:2px">${i.notes}</div>`:''}
  </div>`).join('');

  const html=`<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>${mn} — Manor Chronicle</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Crimson Pro',Georgia,serif;background:#1c1a14;color:#e8dfc8;min-height:100vh;padding:1.5rem;}
.wrap{width:min(800px,100%);margin:0 auto;}

.page-hdr h1{font-family:'IM Fell English',serif;font-size:1.4rem;color:#e8dfc8;}
.page-hdr .sub{font-size:.85rem;color:#9a9080;margin-top:3px;}
.section{background:#252318;border:1px solid #3d3928;border-radius:8px;margin-bottom:12px;overflow:hidden;}
.sec-hdr{background:#2e2b1e;padding:8px 14px;font-family:'IM Fell English',serif;font-size:.95rem;color:#c8bfa8;border-bottom:1px solid #3d3928;}
.sec-body{padding:12px 14px;}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-bottom:10px;}
.stat{background:#2e2b1e;border:1px solid #3d3928;border-radius:4px;padding:6px 10px;}
.stat-lbl{font-size:.65rem;text-transform:uppercase;letter-spacing:.06em;color:#7a7060;margin-bottom:2px;}
.stat-val{font-size:1.1rem;font-weight:600;}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:5px;}
.bar-lbl{font-size:.8rem;color:#9a9080;width:140px;flex-shrink:0;}
.bar-track{flex:1;height:7px;background:#2e2b1e;border-radius:4px;overflow:hidden;border:1px solid #3d3928;}
.bar-fill{height:100%;border-radius:4px;}
.bar-val{font-size:.83rem;font-weight:600;width:24px;text-align:right;}
.sum-badge{display:inline-flex;padding:2px 7px;border-radius:20px;font-size:.72rem;font-weight:600;border:1px solid;}
.sum-bad-red{background:#281818;color:#c85050;border-color:#4a1818;}
.sum-bad-grn{background:#182418;color:#5a9c6a;border-color:#1e3a1e;}
.sum-bad-tan{background:#2e2418;color:#c8922a;border-color:#4a2e08;}
.sum-bad-gry{background:#2e2b1e;color:#9a9080;border-color:#3d3928;}
.sum-bad-blu{background:#181c28;color:#5882a8;border-color:#1e2e48;}
.sum-bad-pur{background:#1e1828;color:#8868b8;border-color:#2e1e48;}
table{width:100%;border-collapse:collapse;font-size:.85rem;}
th{text-align:left;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#7a7060;padding:5px 8px;border-bottom:1px solid #3d3928;}
td{padding:6px 8px;border-bottom:1px solid #2e2b1e;vertical-align:top;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#2e2b1e;}
.imp-card{padding:6px 0;border-bottom:1px solid #2e2b1e;}
.imp-card:last-child{border-bottom:none;}
.footer{text-align:center;font-size:.72rem;color:#4a4535;margin-top:16px;font-style:italic;}
</style>
</head>
<body>
<div class="wrap">
  <div class="page-hdr">
    <h1>${mn}</h1>
    <div class="sub">${m.knight||''}${m.player?' &middot; '+m.player:''}${m.faction&&m.faction!=='—'?' &middot; '+m.faction:''} &middot; Manor Chronicle</div>
  </div>

  <div class="section">
    <div class="sec-hdr">Current Status</div>
    <div class="sec-body">
      <div class="stat-grid">
        <div class="stat"><div class="stat-lbl">Treasury (last)</div><div class="stat-val" style="color:${lastT(m)>=0?'#5a9c6a':'#c85050'}">${lastT(m)}L</div></div>
        <div class="stat"><div class="stat-lbl">Base Harvest</div><div class="stat-val">${m.baseHarvest}L</div></div>
        <div class="stat"><div class="stat-lbl">Lifestyle</div><div class="stat-val" style="font-size:.9rem">${m.lifestyle}</div></div>
        ${dv>0?`<div class="stat"><div class="stat-lbl">Total DV</div><div class="stat-val" style="color:#8868b8">+${dv}</div></div>`:''}
      </div>
      <div class="bar-row">
        <span class="bar-lbl">Hatred (landlord)</span>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.min(m.hatred/30*100,100)}%;background:#c85050"></div></div>
        <span class="bar-val">${m.hatred}</span>
      </div>
      <div class="bar-row">
        <span class="bar-lbl">Care (commoners)</span>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.min(m.care/30*100,100)}%;background:#5a9c6a"></div></div>
        <span class="bar-val">${m.care}</span>
      </div>
      ${m.notes?`<p style="font-size:.83rem;color:#9a9080;font-style:italic;margin-top:8px">${m.notes}</p>`:''}
    </div>
  </div>

  ${improvs.length?`<div class="section">
    <div class="sec-hdr">Improvements &amp; Fortifications</div>
    <div class="sec-body">${impCards}</div>
  </div>`:''}

  ${damaged.length?`<div class="section">
    <div class="sec-hdr">Outstanding Property Damage</div>
    <div class="sec-body">${damaged.map(d=>`<div class="imp-card"><strong style="color:#c8922a">${d.description}</strong>${d.repairCost?` <span style="color:#9a9080;font-size:.8rem">&mdash; ${d.repairCost}L repair</span>`:''}</div>`).join('')}</div>
  </div>`:''}

  <div class="section">
    <div class="sec-hdr">Year-by-Year Ledger (${m.history.length} entries)</div>
    <div class="sec-body" style="padding:0">
      <table>
        <thead><tr><th>Year</th><th>Luck</th><th>Harvest</th><th style="text-align:right">Income</th><th style="text-align:right">Expenses</th><th style="text-align:right">Treasury</th><th>Notes</th></tr></thead>
        <tbody>${histRows}</tbody>
      </table>
    </div>
  </div>

  <p class="footer">Pendragon Manor Ledger &mdash; ${mn} Chronicle &mdash; Exported ${new Date().toLocaleDateString()}</p>
</div>
</body>
</html>`;

  const b=new Blob([html],{type:'text/html'});
  const u=URL.createObjectURL(b);
  const a=document.createElement('a');
  a.href=u;a.download=`${mn.toLowerCase()}_manor_chronicle.html`;a.click();
  URL.revokeObjectURL(u);
  toast(mn+' exported');
}

// ── YEAR SUMMARY ──────────────────────────────────────────────────────────
function openYearSummary(){
  // Populate year selector with all years that appear in any manor
  const allYears=new Set();
  Object.values(S.manors).forEach(m=>m.history.forEach(h=>allYears.add(h.year)));
  const sorted=[...allYears].sort((a,b)=>b-a);
  const sel=g('sumYrSel');
  sel.innerHTML=sorted.map(y=>`<option value="${y}"${y===S.currentYear?' selected':''}>${y}</option>`).join('');
  openM('modSum');
  renderSummary();
}

function renderSummary(){
  const yr=parseInt(g('sumYrSel').value);
  g('sumTitle').textContent=`Year ${yr} AD — All Manors`;
  g('sumBody').innerHTML=buildSummaryHTML(yr,true);
}

function buildSummaryHTML(yr,forScreen){
  const manorNames=Object.keys(S.manors);
  const cards=manorNames.map(mn=>{
    const m=S.manors[mn];
    const r=m.history.find(h=>h.year===yr);
    if(!r)return`<div class="sum-card"><div class="sum-hdr"><h4>${mn}</h4><span class="sum-yr">No record for ${yr} AD</span></div></div>`;
    const ti=(r.harvestIncome||0)+(r.stewardIndustry||0)+(r.improvIncome||0)+(r.discretionary||0)+(r.extraManorial||0)+(r.miscIncome||0)+(r.prevTreasury||0);
    const te=(r.lifestyleCost||0)+(r.improvMaint||0)+(r.family||0)+(r.improvBuild||0)+(r.miscExp||0);
    const net=r.treasury||0;
    const rft=(r.fateWeather||0)+(r.fateConflict||0)+(r.fateCommoners||0)+(r.fatePresence||0)+(r.fateMisc||0);
    const ho=r.harvestOutcome&&r.harvestOutcome!=='—'?r.harvestOutcome:r.harvestResult||'—';
    const hcl={'Incredible':'sum-bad-grn','Excellent':'sum-bad-grn','Good':'sum-bad-grn','Regular':'sum-bad-gry','Meager':'sum-bad-tan','Bad':'sum-bad-tan','Very Bad':'sum-bad-red','Negligible':'sum-bad-red'}[ho]||'sum-bad-gry';
    const lcl=r.luck==='Boon'?'sum-bad-grn':r.luck==='Calamity'?'sum-bad-red':'sum-bad-gry';
    const ccl=['Plundered','Pillaged'].includes(r.conflict)?'sum-bad-red':['Raided','Bandits'].includes(r.conflict)?'sum-bad-tan':r.conflict==='No Result'?'sum-bad-gry':'sum-bad-gry';
    const notes=[r.notes,r.notes2].filter(Boolean).join(' — ');
    const improvs=m.improvements.filter(i=>i.status!=='destroyed');
    return`<div class="sum-card">
  <div class="sum-hdr">
    <h4>${mn}${m.knight?` &mdash; ${m.knight}`:''}</h4>
    <span class="sum-yr">${m.player?m.player+' &middot; ':''}</span>
  </div>
  <div class="sum-body">
    <div class="sum-badges">
      <span class="sum-badge ${hcl}">Harvest: ${ho}</span>
      <span class="sum-badge ${lcl}">${r.luck}</span>
      ${r.conflict!=='No Result'?`<span class="sum-badge ${ccl}">${r.conflict}${r.conflictSeason&&r.conflictSeason!=='—'?' ('+r.conflictSeason+')':''}</span>`:''}
    </div>
    <div class="sum-section">
      <h5>Finances</h5>
      <div class="sum-row"><span>Harvest income</span><span>${(r.harvestIncome||0).toFixed(1)}L</span></div>
      ${(r.stewardIndustry||0)+(r.improvIncome||0)+(r.discretionary||0)+(r.extraManorial||0)+(r.miscIncome||0)>0?`<div class="sum-row"><span>Other income</span><span>+${((r.stewardIndustry||0)+(r.improvIncome||0)+(r.discretionary||0)+(r.extraManorial||0)+(r.miscIncome||0)).toFixed(1)}L</span></div>`:''}
      <div class="sum-row"><span>Treasury carried in</span><span>${r.prevTreasury||0}L</span></div>
      <div class="sum-row" style="color:var(--red)"><span>Expenses</span><span>&minus;${te.toFixed(1)}L</span></div>
      <div class="sum-row sum-tot"><span>Treasury rollover</span><span style="color:${net>=0?'#14491f':'#7a1212'}">${net.toFixed(1)}L</span></div>
    </div>
    <div class="sum-section">
      <h5>Manor Status</h5>
      <div class="sum-row"><span>Hatred (landlord)</span><span>${m.hatred}</span></div>
      <div class="sum-row"><span>Care (commoners)</span><span>${m.care}</span></div>
      ${improvs.length?`<div class="sum-row"><span>Improvements</span><span>${improvs.map(i=>i.name).join(', ')}</span></div>`:''}
      ${rft!==0?`<div class="sum-row"><span>Fate total</span><span>${rft>0?'+':''}${rft}</span></div>`:''}
    </div>
    ${notes?`<div class="sum-note">${notes}</div>`:''}
  </div>
</div>`;
  }).join('');

  const allNet=manorNames.reduce((s,mn)=>{const r=S.manors[mn].history.find(h=>h.year===yr);return s+(r?r.treasury||0:0);},0);
  return`<div style="margin-bottom:12px">
  <div class="sum-all-hdr">The Year ${yr} AD &mdash; Winter Phase Chronicle</div>
</div>
${cards}
<div class="sum-card" style="border-color:#6b4012">
  <div class="sum-hdr" style="background:#3d2010">
    <h4>Combined treasury</h4>
    <span class="sum-yr" style="font-weight:700;font-size:.9rem;color:${allNet>=0?'#7ab87a':'#c87070'}">${allNet.toFixed(1)}L across all manors</span>
  </div>
</div>`;
}

function exportSummaryImage(){
  const yr=parseInt(g('sumYrSel').value);
  const manorNames=Object.keys(S.manors);
  const SCALE=2; // retina

  // ── palette ──────────────────────────────────────────────────────────────
  const C={
    bg:'#1c1a14', s1:'#252318', s2:'#2e2b1e', brd:'#4a4535', bl:'#3d3928',
    p:'#e8dfc8', pd:'#c8bfa8', il:'#c8bfa8', dim:'#9a9080', vdim:'#7a7060',
    amb:'#c8922a', red:'#c85050', grn:'#5a9c6a',
    badRedBg:'#281818', badRedFg:'#c85050', badRedBd:'#4a1818',
    badGrnBg:'#182418', badGrnFg:'#5a9c6a', badGrnBd:'#1e3a1e',
    badTanBg:'#2e2418', badTanFg:'#c8922a', badTanBd:'#4a2e08',
    badGryBg:'#2e2b1e', badGryFg:'#9a9080', badGryBd:'#3d3928',
  };

  // ── layout constants ──────────────────────────────────────────────────────
  const PAD=28, CARD_W=340, CARD_GAP=16;
  const COLS=Math.min(manorNames.length,2);
  const TOTAL_W=PAD*2 + CARD_W*COLS + CARD_GAP*(COLS-1);

  // ── helpers ───────────────────────────────────────────────────────────────
  function badge(ctx,x,y,text,bgc,fgc,bdc){
    ctx.font=`bold ${11*SCALE}px sans-serif`;
    const tw=ctx.measureText(text).width;
    const bw=tw+12*SCALE, bh=18*SCALE, br=9*SCALE;
    ctx.fillStyle=bgc;
    ctx.strokeStyle=bdc;
    ctx.lineWidth=SCALE;
    ctx.beginPath();
    ctx.roundRect(x,y,bw,bh,br);
    ctx.fill();ctx.stroke();
    ctx.fillStyle=fgc;
    ctx.fillText(text,x+6*SCALE,y+13*SCALE);
    return bw+6*SCALE; // advance
  }
  function badgeColors(cls){
    if(cls==='sum-bad-red')return[C.badRedBg,C.badRedFg,C.badRedBd];
    if(cls==='sum-bad-grn')return[C.badGrnBg,C.badGrnFg,C.badGrnBd];
    if(cls==='sum-bad-tan')return[C.badTanBg,C.badTanFg,C.badTanBd];
    return[C.badGryBg,C.badGryFg,C.badGryBd];
  }
  function hcl(ho){
    if(['Incredible','Excellent','Good'].includes(ho))return'sum-bad-grn';
    if(['Meager','Bad'].includes(ho))return'sum-bad-tan';
    if(['Very Bad','Negligible'].includes(ho))return'sum-bad-red';
    return'sum-bad-gry';
  }
  function lcl(luck){return luck==='Boon'?'sum-bad-grn':luck==='Calamity'?'sum-bad-red':'sum-bad-gry';}
  function ccl(c){return['Plundered','Pillaged'].includes(c)?'sum-bad-red':['Raided','Bandits'].includes(c)?'sum-bad-tan':'sum-bad-gry';}

  // ── measure card height ───────────────────────────────────────────────────
  function cardHeight(mn){
    const m=S.manors[mn];
    const r=m.history.find(h=>h.year===yr);
    if(!r)return 60*SCALE;
    const improvs=m.improvements.filter(i=>i.status!=='destroyed');
    const notes=[r.notes,r.notes2].filter(Boolean).join(' — ');
    const rft=(r.fateWeather||0)+(r.fateConflict||0)+(r.fateCommoners||0)+(r.fatePresence||0)+(r.fateMisc||0);
    const otherInc=(r.stewardIndustry||0)+(r.improvIncome||0)+(r.discretionary||0)+(r.extraManorial||0)+(r.miscIncome||0);
    let rows=3; // harvest + treasury in + expenses + total
    if(otherInc>0)rows++;
    rows+=2; // hatred + care
    if(improvs.length)rows++;
    if(rft!==0)rows++;
    let h=44+24+8+20+8+rows*18+8; // header+badges+sections
    if(notes)h+=38; // note block
    return h*SCALE+24*SCALE;
  }

  // ── compute total canvas height ───────────────────────────────────────────
  const headerH=70*SCALE;
  const footerH=30*SCALE;
  const colHeights=Array.from({length:COLS},(_,ci)=>{
    let h=0;
    manorNames.filter((_,i)=>i%COLS===ci).forEach(mn=>{h+=cardHeight(mn)+CARD_GAP*SCALE;});
    return h;
  });
  const bodyH=Math.max(...colHeights);
  const TOTAL_H=PAD*SCALE+headerH+PAD*SCALE+bodyH+footerH+PAD*SCALE;

  // ── create canvas ─────────────────────────────────────────────────────────
  const canvas=document.createElement('canvas');
  canvas.width=TOTAL_W*SCALE;
  canvas.height=TOTAL_H;
  const ctx=canvas.getContext('2d');
  ctx.scale(1,1); // we handle SCALE manually via font sizes & coords

  // ── background ────────────────────────────────────────────────────────────
  ctx.fillStyle=C.bg;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // ── header banner ─────────────────────────────────────────────────────────
  const hbx=PAD*SCALE, hby=PAD*SCALE, hbw=(TOTAL_W-PAD*2)*SCALE, hbh=headerH;
  ctx.fillStyle=C.s2;
  ctx.strokeStyle=C.amb;
  ctx.lineWidth=2*SCALE;
  ctx.beginPath();
  ctx.roundRect(hbx,hby,hbw,hbh,8*SCALE);
  ctx.fill();ctx.stroke();
  ctx.fillStyle=C.amb;
  ctx.font=`bold ${11*SCALE}px sans-serif`;
  ctx.fillText('PENDRAGON MANOR LEDGER',hbx+20*SCALE,hby+22*SCALE);
  ctx.fillStyle=C.p;
  ctx.font=`${22*SCALE}px 'Times New Roman',serif`;
  ctx.fillText(`The Year ${yr} AD — Winter Phase Chronicle`,hbx+20*SCALE,hby+50*SCALE);

  // ── draw each card ────────────────────────────────────────────────────────
  const colY=Array(COLS).fill(PAD*SCALE+headerH+PAD*SCALE);

  manorNames.forEach((mn,idx)=>{
    const col=idx%COLS;
    const cx=PAD*SCALE+col*(CARD_W+CARD_GAP)*SCALE;
    let cy=colY[col];
    const m=S.manors[mn];
    const r=m.history.find(h=>h.year===yr);
    const ch=cardHeight(mn);

    // card bg
    ctx.fillStyle=C.s1;
    ctx.strokeStyle=C.brd;
    ctx.lineWidth=SCALE;
    ctx.beginPath();
    ctx.roundRect(cx,cy,CARD_W*SCALE,ch,8*SCALE);
    ctx.fill();ctx.stroke();

    if(!r){
      ctx.fillStyle=C.dim;
      ctx.font=`italic ${12*SCALE}px serif`;
      ctx.fillText('No record for '+yr+' AD',cx+14*SCALE,cy+36*SCALE);
      colY[col]+=ch+CARD_GAP*SCALE;
      return;
    }

    // card header strip
    ctx.fillStyle=C.s2;
    ctx.beginPath();
    ctx.roundRect(cx,cy,CARD_W*SCALE,40*SCALE,[8*SCALE,8*SCALE,0,0]);
    ctx.fill();
    ctx.strokeStyle=C.bl;
    ctx.lineWidth=SCALE;
    ctx.beginPath();
    ctx.moveTo(cx,cy+40*SCALE);ctx.lineTo(cx+CARD_W*SCALE,cy+40*SCALE);
    ctx.stroke();

    // manor name
    ctx.fillStyle=C.p;
    ctx.font=`bold ${14*SCALE}px 'Times New Roman',serif`;
    ctx.fillText(mn+(m.knight?' — '+m.knight:''),cx+12*SCALE,cy+16*SCALE);
    ctx.fillStyle=C.dim;
    ctx.font=`${10*SCALE}px sans-serif`;
    ctx.fillText((m.player||'')+(m.faction&&m.faction!=='—'?' · '+m.faction:''),cx+12*SCALE,cy+32*SCALE);

    let ry=cy+52*SCALE;

    // badges row
    const ho=r.harvestOutcome&&r.harvestOutcome!=='—'?r.harvestOutcome:r.harvestResult||'—';
    let bx=cx+12*SCALE;
    bx+=badge(ctx,bx,ry,'Harvest: '+ho,...badgeColors(hcl(ho)));
    bx+=badge(ctx,bx,ry,r.luck,...badgeColors(lcl(r.luck)));
    if(r.conflict!=='No Result'){
      const ctext=r.conflict+(r.conflictSeason&&r.conflictSeason!=='—'?' ('+r.conflictSeason+')':'');
      badge(ctx,bx,ry,ctext,...badgeColors(ccl(r.conflict)));
    }
    ry+=26*SCALE;

    // section label helper
    function secLabel(label){
      ctx.fillStyle=C.vdim;
      ctx.font=`bold ${9*SCALE}px sans-serif`;
      ctx.fillText(label.toUpperCase(),cx+12*SCALE,ry);
      ry+=14*SCALE;
    }
    // data row helper
    function row(label,value,valColor){
      ctx.fillStyle=C.il;
      ctx.font=`${12*SCALE}px serif`;
      ctx.fillText(label,cx+12*SCALE,ry);
      ctx.fillStyle=valColor||C.p;
      ctx.font=`bold ${12*SCALE}px serif`;
      const vw=ctx.measureText(value).width;
      ctx.fillText(value,(cx+CARD_W*SCALE)-12*SCALE-vw,ry);
      ry+=17*SCALE;
    }
    // divider
    function div(){
      ctx.strokeStyle=C.bl;ctx.lineWidth=SCALE;
      ctx.beginPath();ctx.moveTo(cx+12*SCALE,ry-3*SCALE);ctx.lineTo(cx+(CARD_W-12)*SCALE,ry-3*SCALE);ctx.stroke();
    }

    // finances
    secLabel('Finances');
    const otherInc=(r.stewardIndustry||0)+(r.improvIncome||0)+(r.discretionary||0)+(r.extraManorial||0)+(r.miscIncome||0);
    const te=(r.lifestyleCost||0)+(r.improvMaint||0)+(r.family||0)+(r.improvBuild||0)+(r.miscExp||0);
    const net=r.treasury||0;
    row('Harvest income',(r.harvestIncome||0).toFixed(1)+'L');
    if(otherInc>0)row('Other income','+'+otherInc.toFixed(1)+'L');
    row('Treasury carried in',(r.prevTreasury||0)+'L');
    row('Expenses','−'+te.toFixed(1)+'L',C.red);
    div();
    row('Treasury rollover',net.toFixed(1)+'L',net>=0?C.grn:C.red);
    ry+=4*SCALE;

    // manor status
    secLabel('Manor Status');
    const improvs=m.improvements.filter(i=>i.status!=='destroyed');
    const rft=(r.fateWeather||0)+(r.fateConflict||0)+(r.fateCommoners||0)+(r.fatePresence||0)+(r.fateMisc||0);
    row('Hatred (landlord)',String(m.hatred),m.hatred>15?C.red:m.hatred<8?C.grn:C.il);
    row('Care (commoners)',String(m.care),m.care>15?C.grn:m.care<8?C.red:C.il);
    if(improvs.length)row('Improvements',improvs.map(i=>i.name).join(', '));
    if(rft!==0)row('Fate total',(rft>0?'+':'')+rft,rft>10?C.red:C.il);

    // notes
    const notes=[r.notes,r.notes2].filter(Boolean).join(' — ');
    if(notes){
      ry+=4*SCALE;
      const notePad=8*SCALE, noteW=CARD_W*SCALE-24*SCALE;
      ctx.fillStyle='rgba(200,146,42,0.12)';
      ctx.strokeStyle=C.amb;
      ctx.lineWidth=SCALE;
      ctx.beginPath();
      ctx.roundRect(cx+12*SCALE,ry,noteW,28*SCALE,4*SCALE);
      ctx.fill();
      // left accent bar
      ctx.fillStyle=C.amb;
      ctx.fillRect(cx+12*SCALE,ry,3*SCALE,28*SCALE);
      ctx.fillStyle=C.pd;
      ctx.font=`italic ${11*SCALE}px serif`;
      // truncate if too long
      let nt=notes;
      while(ctx.measureText(nt).width>noteW-20*SCALE&&nt.length>10)nt=nt.slice(0,-1);
      if(nt!==notes)nt=nt.slice(0,-1)+'…';
      ctx.fillText(nt,cx+20*SCALE,ry+18*SCALE);
      ry+=36*SCALE;
    }

    colY[col]+=ch+CARD_GAP*SCALE;
  });

  // ── combined treasury footer ──────────────────────────────────────────────
  const allNet=manorNames.reduce((s,mn)=>{const r=S.manors[mn].history.find(h=>h.year===yr);return s+(r?r.treasury||0:0);},0);
  const ftx=PAD*SCALE, fty=canvas.height-footerH-PAD*SCALE;
  ctx.fillStyle=C.s2;
  ctx.strokeStyle=C.amb;
  ctx.lineWidth=SCALE;
  ctx.beginPath();
  ctx.roundRect(ftx,fty,(TOTAL_W-PAD*2)*SCALE,footerH,6*SCALE);
  ctx.fill();ctx.stroke();
  ctx.fillStyle=C.dim;
  ctx.font=`${11*SCALE}px sans-serif`;
  ctx.fillText('Combined treasury across all manors',ftx+14*SCALE,fty+19*SCALE);
  ctx.fillStyle=allNet>=0?C.grn:C.red;
  ctx.font=`bold ${14*SCALE}px serif`;
  const ntxt=allNet.toFixed(1)+'L';
  ctx.fillText(ntxt,(ftx+(TOTAL_W-PAD*2)*SCALE)-14*SCALE-ctx.measureText(ntxt).width,fty+20*SCALE);

  // ── download ──────────────────────────────────────────────────────────────
  canvas.toBlob(blob=>{
    const u=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=u;a.download=`pendragon_year_${yr}_summary.png`;a.click();
    URL.revokeObjectURL(u);
    toast('Exported Year '+yr+' as PNG');
  },'image/png');
}
